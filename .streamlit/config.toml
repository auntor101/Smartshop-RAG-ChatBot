[browser]
gatherUsageStats = false

[server]
headless = true
# Avoid scanning optional transformers/torchvision modules on Streamlit Cloud.
fileWatcherType = "none"
enableCORS = false
enableXsrfProtection = true

[theme]
primaryColor             = "#E63946"   # brand-red — buttons, active borders
backgroundColor          = "#FBF8F3"   # bg-canvas — warm paper
secondaryBackgroundColor = "#F2EDE4"   # bg-sunken — sidebar / assistant bubbles
textColor                = "#1F1B16"   # ink-1 — near-black with warm cast
font                     = "sans serif"
