<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 8px; padding: 10px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--line); box-sizing: border-box; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 12px; }
  .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.8; }
  .use  { font-size: 10px; opacity: 0.7; margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#FBF8F3;color:#1F1B16"><div><div class="name">Canvas</div><div class="use">Page bg</div></div><div class="hex">#FBF8F3</div></div>
    <div class="sw" style="background:#FFFFFF;color:#1F1B16"><div><div class="name">Surface</div><div class="use">Cards</div></div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#F7F2E9;color:#1F1B16"><div><div class="name">Soft</div><div class="use">Hover</div></div><div class="hex">#F7F2E9</div></div>
    <div class="sw" style="background:#F2EDE4;color:#1F1B16"><div><div class="name">Sunken</div><div class="use">Sidebar</div></div><div class="hex">#F2EDE4</div></div>
    <div class="sw" style="background:#E8E0D2;color:#1F1B16"><div><div class="name">Line</div><div class="use">Border</div></div><div class="hex">#E8E0D2</div></div>
    <div class="sw" style="background:#A8A095;color:#fff"><div><div class="name">Ink 4</div><div class="use">Placeholder</div></div><div class="hex">#A8A095</div></div>
    <div class="sw" style="background:#7A736A;color:#fff"><div><div class="name">Ink 3</div><div class="use">Caption</div></div><div class="hex">#7A736A</div></div>
    <div class="sw" style="background:#4A453E;color:#fff"><div><div class="name">Ink 2</div><div class="use">Body</div></div><div class="hex">#4A453E</div></div>
    <div class="sw" style="background:#1F1B16;color:#fff"><div><div class="name">Ink 1</div><div class="use">Heading</div></div><div class="hex">#1F1B16</div></div>
    <div class="sw" style="background:#D6CCB5;color:#1F1B16"><div><div class="name">Line+</div><div class="use">Hover edge</div></div><div class="hex">#D6CCB5</div></div>
  </div>
</body></html>
