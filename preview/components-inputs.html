<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); display: flex; flex-direction: column; gap: 14px; max-width: 560px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
  .composer { display: flex; gap: 8px; align-items: center; background: var(--bg-surface); border: 1px solid var(--line); border-radius: 12px; padding: 6px 8px 6px 14px; box-shadow: var(--e-1); }
  .composer input { flex: 1; border: 0; outline: none; background: transparent; font-family: var(--font-body); font-size: 15px; height: 36px; color: var(--ink-1); }
  .composer input::placeholder { color: var(--ink-4); }
  .send { width: 36px; height: 36px; border-radius: 8px; background: var(--brand-red); border: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .send svg { stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
  <div class="field">
    <label>Order ID</label>
    <input class="input" placeholder="SSB-2026-09814">
  </div>
  <div class="field">
    <label>Promo code</label>
    <input class="input" value="REFER200" style="font-family: var(--font-mono); letter-spacing: 0.05em">
  </div>
  <div class="composer">
    <input placeholder="Ask a question about your order…">
    <button class="send" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</body></html>
