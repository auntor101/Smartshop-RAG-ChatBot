  .ic .nm { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--ink-3); margin-top: 16px; max-width: 580px; line-height: 1.5; }
