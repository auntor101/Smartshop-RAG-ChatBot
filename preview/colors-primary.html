<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; box-sizing: border-box; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
  .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
  .use  { font-size: 11px; opacity: 0.85; margin-top: 4px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#E63946;color:#fff"><div><div class="name">Brand Red</div><div class="use">Primary action · brand</div></div><div class="hex">#E63946</div></div>
    <div class="sw" style="background:#1F1B16;color:#fff"><div><div class="name">Brand Deep</div><div class="use">Headlines · text on light</div></div><div class="hex">#1F1B16</div></div>
    <div class="sw" style="background:#0E8C5A;color:#fff"><div><div class="name">Brand Green</div><div class="use">Success · in stock</div></div><div class="hex">#0E8C5A</div></div>
    <div class="sw" style="background:#F5A524;color:#1F1B16"><div><div class="name">Brand Saffron</div><div class="use">Promo · referral</div></div><div class="hex">#F5A524</div></div>
  </div>
</body></html>
