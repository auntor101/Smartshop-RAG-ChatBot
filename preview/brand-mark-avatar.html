<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); }
  .row { display: flex; gap: 16px; }
  .tile { flex: 1; background: var(--bg-surface); border: 1px solid var(--line); border-radius: var(--r-2); padding: 18px; display: flex; align-items: center; gap: 16px; }
  .tile img { width: 56px; height: 56px; display: block; }
  .tile .lbl { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--ink-1); }
  .tile .sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="tile">
      <img src="../assets/mark.svg" alt="Mark">
      <div><div class="lbl">Mark</div><div class="sub">Favicon · slide corner · app icon</div></div>
    </div>
    <div class="tile">
      <img src="../assets/shira-avatar.svg" alt="Shira avatar">
      <div><div class="lbl">Shira avatar</div><div class="sub">Assistant identity in chat</div></div>
    </div>
  </div>
</body></html>
