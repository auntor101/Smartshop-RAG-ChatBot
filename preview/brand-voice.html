<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); display: flex; align-items: flex-start; gap: 16px; }
  .avatar { width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--line); padding: 4px; box-sizing: border-box; }
  .stack { display: flex; flex-direction: column; gap: 8px; max-width: 560px; }
  .who { font-size: 12px; font-weight: 600; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; }
  .bubble { background: var(--bg-sunken); border-radius: 12px; padding: 14px 16px; color: var(--ink-1); font-size: 15px; line-height: 1.5; }
  .meta { font-size: 12px; color: var(--ink-3); display: flex; gap: 12px; }
  .meta b { font-weight: 600; color: var(--ink-2); }
</style></head>
<body>
  <img class="avatar" src="../assets/shira-avatar.svg" alt="">
  <div class="stack">
    <div class="who">Shira · ShopSmart BD support</div>
    <div class="bubble">Hi! Standard delivery is 3–7 business days, and express is 1–2 business days in eligible areas. Orders over BDT 1000 ship free. Is there anything else I can help you with?</div>
    <div class="meta"><span><b>Warm</b> greeting</span><span><b>Specific</b> numbers</span><span><b>≤ 3</b> sentences</span><span>No emoji</span></div>
  </div>
</body></html>
