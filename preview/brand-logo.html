<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-canvas); }
  .row { display: flex; align-items: center; gap: 32px; }
  .logo-wrap { background: var(--bg-surface); border: 1px solid var(--line); border-radius: var(--r-2); padding: 20px 28px; }
  .logo-wrap img { display: block; height: 56px; }
  .meta { display: flex; flex-direction: column; gap: 6px; }
  .meta .name { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--ink-1); letter-spacing: -0.01em; }
  .meta .sub { color: var(--ink-3); font-size: 14px; }
  .swatch-row { display: flex; gap: 8px; margin-top: 4px; }
  .swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--line); }
</style></head>
<body>
  <div class="row">
    <div class="logo-wrap"><img src="../assets/logo.svg" alt="ShopSmart BD"></div>
    <div class="meta">
      <div class="name">ShopSmart BD</div>
      <div class="sub">Wordmark + bag mark · Manrope 800 · Brand Red on Deep Ink</div>
      <div class="swatch-row">
        <div class="swatch" style="background:#E63946"></div>
        <div class="swatch" style="background:#1F1B16"></div>
        <div class="swatch" style="background:#FBF8F3"></div>
      </div>
    </div>
  </div>
</body></html>
