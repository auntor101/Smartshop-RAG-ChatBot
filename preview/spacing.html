<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-canvas); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .tok { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--brand-red); border-radius: 4px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); font-weight: 600; }
</style></head>
<body>
  <div class="row">
    <div class="tok"><div class="box" style="width:4px;height:4px"></div><div class="lbl">s-1</div><div class="px">4</div></div>
    <div class="tok"><div class="box" style="width:8px;height:8px"></div><div class="lbl">s-2</div><div class="px">8</div></div>
    <div class="tok"><div class="box" style="width:12px;height:12px"></div><div class="lbl">s-3</div><div class="px">12</div></div>
    <div class="tok"><div class="box" style="width:16px;height:16px"></div><div class="lbl">s-4</div><div class="px">16</div></div>
    <div class="tok"><div class="box" style="width:24px;height:24px"></div><div class="lbl">s-5</div><div class="px">24</div></div>
    <div class="tok"><div class="box" style="width:32px;height:32px"></div><div class="lbl">s-6</div><div class="px">32</div></div>
    <div class="tok"><div class="box" style="width:48px;height:48px"></div><div class="lbl">s-7</div><div class="px">48</div></div>
    <div class="tok"><div class="box" style="width:64px;height:64px"></div><div class="lbl">s-8</div><div class="px">64</div></div>
  </div>
</body></html>
