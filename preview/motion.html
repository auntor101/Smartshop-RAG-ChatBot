<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg-canvas); }
  .row { display: flex; align-items: center; gap: 28px; }
  .curve { background: var(--bg-surface); border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 6px; }
  .lbl b { color: var(--ink-1); font-weight: 600; }
  .dots { display: flex; gap: 14px; align-items: center; }
  .dot { width: 14px; height: 14px; background: var(--brand-red); border-radius: 50%; animation: slide 1.6s var(--ease) infinite; }
  .dot:nth-child(2) { animation-delay: 0.12s; }
  .dot:nth-child(3) { animation-delay: 0.24s; }
  @keyframes slide { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-6px); opacity: 0.4; } }
  .meta { font-family: var(--font-body); font-size: 13px; color: var(--ink-2); max-width: 320px; line-height: 1.45; }
  .meta b { color: var(--ink-1); font-family: var(--font-mono); font-size: 12px; }
</style></head>
<body>
  <div class="row">
    <div>
      <div class="curve">
        <svg width="180" height="60" viewBox="0 0 180 60">
          <path d="M0,60 C36,60 36,0 180,0" fill="none" stroke="#E63946" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="lbl"><b>cubic-bezier(0.2, 0.7, 0.2, 1)</b> · ease-out-standard</div>
    </div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="meta">
      <b>120ms</b> hover · <b>200ms</b> base · <b>360ms</b> entry.<br>
      Fades and small translates only. No bounce, no spring.
    </div>
  </div>
</body></html>
