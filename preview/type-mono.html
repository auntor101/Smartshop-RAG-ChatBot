<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); }
  pre { font-family: var(--font-mono); font-size: 14px; line-height: 1.6; color: var(--ink-1); background: var(--bg-sunken); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin: 0; max-width: 600px; }
  .k { color: #B85D3E; }
  .s { color: #0E8C5A; }
  .c { color: #7A736A; }
  .meta { display: flex; gap: 18px; margin-top: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .meta b { color: var(--ink-2); font-weight: 600; }
</style></head>
<body>
  <pre><span class="c"># Order ID</span>
<span class="k">ORDER</span> = <span class="s">"SSB-2026-09814"</span>
<span class="k">STATUS</span> = <span class="s">"OUT_FOR_DELIVERY"</span>
<span class="k">PRICE</span>  = <span class="s">BDT 24,990</span></pre>
  <div class="meta"><span><b>Family</b> JetBrains Mono</span><span><b>Weights</b> 400 · 600</span><span><b>Used for</b> order IDs, config, code, tokens</span></div>
</body></html>
