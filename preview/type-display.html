<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg-canvas); }
  .specimen { font-family: var(--font-display); font-weight: 800; font-size: 56px; line-height: 1.05; letter-spacing: -0.02em; color: var(--ink-1); }
  .sub { font-family: var(--font-display); font-weight: 800; font-size: 32px; line-height: 1.1; letter-spacing: -0.015em; color: var(--brand-red); margin-top: 4px; }
  .meta { display: flex; gap: 18px; margin-top: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .meta b { color: var(--ink-2); font-weight: 600; }
</style></head>
<body>
  <div class="specimen">ShopSmart BD</div>
  <div class="sub">Display · Manrope 800</div>
  <div class="meta"><span><b>Family</b> Manrope</span><span><b>Weights</b> 700 · 800</span><span><b>Tracking</b> -0.02em</span><span><b>Used for</b> hero, slide titles, product names</span></div>
</body></html>
